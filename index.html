<!DOCTYPE html>
<html>
<head>
  <title>AI Script Generator</title>
</head>
<script>
async function generateScript() {
  const nama = document.querySelector('[placeholder="Nama bisnis"]').value;
  const produk = document.querySelector('[placeholder="Produk/jasa"]').value;
  const target = document.querySelector('[placeholder="Target market"]').value;
  const masalah = document.querySelector('[placeholder="Masalah target"]').value;
  const keunggulan = document.querySelector('[placeholder="Keunggulan"]').value;
  const funnel = document.querySelectorAll("select")[0].value;
  const tone = document.querySelectorAll("select")[1].value;
  const platform = document.querySelectorAll("select")[2].value;

  const prompt = `
Buatkan skrip konten ${platform} dengan gaya ${tone}.

Format:
Hook:
Body:
CTA:

Data:
- Nama bisnis: ${nama}
- Produk: ${produk}
- Target: ${target}
- Masalah: ${masalah}
- Keunggulan: ${keunggulan}
- Funnel: ${funnel}

Buat singkat, padat, langsung siap dipakai.
Jangan pakai tabel.
`;

  const response = await fetch("AIzaSyBRW_8ajyARK6ljYoJcLjyShP_7WJ_bkho", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      contents: [{
        parts: [{ text: prompt }]
      }]
    })
  });

  const data = await response.json();

  const result = data.candidates?.[0]?.content?.parts?.[0]?.text || "Error";

  document.getElementById("result").innerText = result;
}
</script>
  <body>

<h2>Script Generator</h2>

<input id="nama" placeholder="Nama bisnis"><br>
<input id="produk" placeholder="Produk"><br>
<input id="target" placeholder="Target market"><br>
<input id="masalah" placeholder="Masalah"><br>
<input id="keunggulan" placeholder="Keunggulan"><br>

<select id="funnel">
  <option>TOFU</option>
  <option>MOFU</option>
  <option>BOFU</option>
</select><br>

<select id="tone">
  <option>santai</option>
  <option>profesional</option>
  <option>hard selling</option>
</select><br>

<select id="platform">
  <option>TikTok</option>
  <option>Instagram</option>
</select><br><br>

<button onclick="generate()">Generate</button>

<pre id="output"></pre>

<script>
async function generate() {

  const prompt = `
Buat script video iklan.

Nama Bisnis: ${nama.value}
Produk: ${produk.value}
Target Market: ${target.value}
Masalah: ${masalah.value}
Keunggulan: ${keunggulan.value}
Funnel: ${funnel.value}
Tone: ${tone.value}
Platform: ${platform.value}

Buat:
- 3 Hook
- 1 Body
- 1 CTA
`;

  const res = await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=API_KEY_KAMU", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      contents: [{ parts: [{ text: prompt }] }]
    })
  });

  const data = await res.json();
  document.getElementById("output").innerText =
    data.candidates[0].content.parts[0].text;
}
</script>

</body>
</html>
